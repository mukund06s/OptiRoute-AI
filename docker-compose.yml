services:
  postgres:
    image: postgres:15-alpine
    container_name: optiroute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: optiroute
      POSTGRES_PASSWORD: optiroute
      POSTGRES_DB: optiroute_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiroute -d optiroute_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiroute-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      DATABASE_URL: postgresql://optiroute:optiroute@postgres:5432/optiroute_db
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: optiroute-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      BACKEND_API_URL: http://backend:5000/api
      MODEL_PATH: models/delay_predictor.pkl
    volumes:
      - ./ml-service:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optiroute-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_APP_NAME: OptiRoute
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  n8n:
    image: n8nio/n8n:latest
    container_name: optiroute-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
