name: optiroute

networks:
  optiroute-net:
    driver: bridge

volumes:
  postgres_data:
    name: optiroute-postgres-data
  n8n_data:
    name: optiroute-n8n-data

services:
  postgres:
    image: postgres:15-alpine
    container_name: optiroute-postgres
    restart: unless-stopped
    networks:
      - optiroute-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-optiroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optiroute}
      POSTGRES_DB: ${POSTGRES_DB:-optiroute_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-optiroute} -d ${POSTGRES_DB:-optiroute_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: optiroute-ml-service
    restart: unless-stopped
    networks:
      - optiroute-net
    ports:
      - "${ML_PORT:-8000}:8000"
    environment:
      PORT: 8000
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_API_URL: http://backend:5000/api
      MODEL_PATH: ${ML_MODEL_PATH:-models/risk_model.pkl}
      CORS_ORIGINS: ${ML_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://backend:5000}
      MAX_REQUEST_BYTES: 65536
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: optiroute-backend
    restart: unless-stopped
    networks:
      - optiroute-net
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-optiroute}:${POSTGRES_PASSWORD:-optiroute}@postgres:5432/${POSTGRES_DB:-optiroute_db}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      JSON_BODY_LIMIT: 512kb
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_STRICT_MAX: 20
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_CYCLE_INTERVAL_MINUTES: 15
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OptiRoute}
    container_name: optiroute-frontend
    restart: unless-stopped
    networks:
      - optiroute-net
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  n8n:
    image: n8nio/n8n:latest
    container_name: optiroute-n8n
    restart: unless-stopped
    profiles:
      - automation
    networks:
      - optiroute-net
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
