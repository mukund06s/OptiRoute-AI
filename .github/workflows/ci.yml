name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build, Lint, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: optiroute
          POSTGRES_PASSWORD: optiroute
          POSTGRES_DB: optiroute_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optiroute -d optiroute_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://optiroute:optiroute@localhost:5432/optiroute_db
      NODE_ENV: test
      PORT: 5000
      ML_SERVICE_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: "false"
      JSON_BODY_LIMIT: 512kb

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma

      - name: Seed database
        run: npx tsx ../prisma/seed.ts

      - name: TypeScript build
        run: npm run build 2>&1 | tee build.log

      - name: Lint
        run: npm run lint:ci

      - name: Run backend tests
        run: npm run test:ci 2>&1 | tee test.log

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-logs
          path: |
            backend/build.log
            backend/test.log
          if-no-files-found: ignore

  frontend:
    name: Frontend Build, Lint, TypeScript
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_APP_NAME: OptiRoute

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript validation
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build 2>&1 | tee build.log

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-logs
          path: frontend/build.log
          if-no-files-found: ignore

  ml:
    name: ML Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare model artifacts
        run: python training/train_model.py 2>&1 | tee train.log

      - name: Verify trained model exists
        run: test -f models/risk_model.pkl

      - name: CI validation (imports and FastAPI startup)
        run: python scripts/ci_validate.py 2>&1 | tee ci-validate.log

      - name: Upload ML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-ci-logs
          path: |
            ml-service/train.log
            ml-service/ci-validate.log
          if-no-files-found: ignore

  docker:
    name: Docker Validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11 (model artifacts for image build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Prepare ML model artifacts
        working-directory: ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python training/train_model.py
          test -f models/risk_model.pkl

      - name: Validate Docker Compose configuration
        env:
          COMPOSE_FILE: docker-compose.yml
        run: docker compose config > docker-compose-config.txt

      - name: Build Docker images
        env:
          COMPOSE_FILE: docker-compose.yml
        run: docker compose build 2>&1 | tee docker-build.log

      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-ci-logs
          path: |
            docker-compose-config.txt
            docker-build.log
          if-no-files-found: ignore
